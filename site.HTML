<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naam Checker</title>
    
    <!-- Ingebouwde debugger om fouten makkelijk op te sporen -->
    <script>
        window.onerror = function(msg, url, line, col, error) {
            alert("Er is een fout opgetreden!\n\nMelding: " + msg + "\nOp regel: " + line);
            return false;
        };
    </script>

    <style>
        /* Basis en achtergrond - trager en vloeiender gemaakt */
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e0eafc, #cfdef3, #e0eafc);
            background-size: 200% 200%;
            animation: gradientBG 10s ease-in-out infinite;
            overflow: hidden; 
            transition: background 0.8s ease-in-out;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container met verbeterd 3D effect en hardware acceleratie */
        .container-wrapper {
            perspective: 1000px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 320px;
            transform-style: preserve-3d;
            /* Basis overgang, wordt door JS overschreven voor super smooth effect */
            transition: transform 0.1s ease-out, box-shadow 0.3s ease-in-out, background-color 0.4s ease;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        @keyframes popIn {
            0% { transform: scale(0.8) rotateX(15deg); opacity: 0; }
            100% { transform: scale(1) rotateX(0deg); opacity: 1; }
        }

        /* Invoerveld vloeiender gemaakt */
        input {
            padding: 12px;
            width: 80%;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform: translateZ(20px); 
            will-change: transform, box-shadow;
        }

        input:focus {
            outline: none;
            border-color: #007BFF;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
            transform: translateZ(30px) scale(1.03);
        }

        /* Knop met zachtere schaduwen */
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            transform: translateZ(30px); 
            will-change: transform, box-shadow;
        }

        button:hover {
            background-color: #0056b3;
            transform: translateZ(40px) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 123, 255, 0.4);
        }

        button:active {
            transform: translateZ(25px) translateY(2px);
            box-shadow: 0 2px 5px rgba(0, 123, 255, 0.3);
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
            transform: translateZ(10px);
            box-shadow: none;
        }

        /* Antwoord tekst */
        #antwoord {
            margin-top: 25px;
            font-weight: bold;
            font-size: 18px;
            color: #333;
            min-height: 4em;
            display: block;
            transform: translateZ(20px);
            transition: color 0.4s ease;
        }

        /* --- NIEUWE FEATURES --- */

        /* Vibe Meter zachter inladen */
        .vibe-box {
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.8s ease-in-out, transform 0.6s ease;
            transform: translateZ(15px) translateY(10px);
        }

        .vibe-box.show {
            opacity: 1;
            transform: translateZ(15px) translateY(0);
        }

        .vibe-label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
            transition: color 0.4s ease;
        }

        .vibe-bar {
            width: 100%;
            height: 15px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ccc;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .vibe-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff4e50, #f9d423, #00c9ff, #92fe9d);
            background-size: 300% 100%;
            transition: width 2s cubic-bezier(0.22, 1, 0.36, 1); /* Super vloeiende balk */
            animation: vibeShimmer 4s infinite linear;
        }

        @keyframes vibeShimmer {
            0% { background-position: 100% 0; }
            100% { background-position: 0 0; }
        }

        /* Volledig Scherm Trillen - Vloeiendere golfbeweging */
        body.mega-shake {
            animation: megaShake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) infinite;
        }
        @keyframes megaShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-3px, 3px) rotate(-0.5deg); }
            50% { transform: translate(3px, -3px) rotate(0.5deg); }
            75% { transform: translate(-3px, -3px) rotate(-0.5deg); }
        }

        /* Hacker Mode Easter Egg */
        body.hacker-mode {
            background: #050505;
        }
        .container.hacker-mode-container {
            background: #111;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4);
            border: 1px solid #0f0;
        }
        .hacker-text {
            color: #0f0 !important;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 8px #0f0;
        }

        /* Confetti sterren - zachtere val */
        .star {
            position: absolute;
            top: -20px;
            font-size: 24px;
            animation: fall 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            pointer-events: none;
            z-index: 999;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* Specifieke tekst effecten */
        .anim-shake {
            color: #d9534f !important;
        }
        .anim-glow {
            color: #d4af37 !important;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.6), 0 0 16px rgba(212, 175, 55, 0.4);
            animation: pulseGlow 2s infinite alternate ease-in-out;
        }
        @keyframes pulseGlow {
            from { transform: scale(1); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
            to { transform: scale(1.03); text-shadow: 0 0 20px rgba(212, 175, 55, 0.9), 0 0 40px rgba(212, 175, 55, 0.6); }
        }
    </style>
</head>
<body>

    <div class="container-wrapper">
        <div class="container" id="mainCard">
            <h1 id="titleText" style="transition: color 0.4s ease;">Is deze persoon leuk?</h1>
            
            <input type="text" id="naamInput" placeholder="Typ een naam...">
            <br>
            <button id="checkKnop" onclick="checkNaam()">Check het!</button>
            
            <p id="antwoord"></p>

            <div class="vibe-box" id="vibeBox">
                <div class="vibe-label" id="vibeLabel">Vibe Meter: 0%</div>
                <div class="vibe-bar">
                    <div class="vibe-fill" id="vibeFill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. VLOEIEND 3D Kantel effect voor de container
        const card = document.getElementById('mainCard');
        
        document.addEventListener('mousemove', (e) => {
            // Snelle, vloeiende reactie tijdens het bewegen
            card.style.transition = 'transform 0.1s ease-out'; 
            const xAxis = (window.innerWidth / 2 - e.pageX) / 30; // Iets subtielere hoek (/30 ipv /25)
            const yAxis = (window.innerHeight / 2 - e.pageY) / 30;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        // Glijd boterzacht terug naar het midden als de muis weggaat
        document.addEventListener('mouseleave', () => {
            card.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.8, 0.25, 1)';
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // 2. Vloeiendere Typemachine functie
        let typTimeout;
        function typeWriter(text, element, speed = 35) {
            element.innerHTML = "";
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    typTimeout = setTimeout(type, speed);
                }
            }
            type();
        }

        // 3. Confetti genereren
        function gooiSterren() {
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const star = document.createElement("div");
                    star.innerHTML = "⭐";
                    star.className = "star";
                    star.style.left = Math.random() * 100 + "vw";
                    star.style.fontSize = Math.random() * 20 + 10 + "px";
                    star.style.animationDuration = Math.random() * 3 + 2 + "s"; // Iets tragere val
                    document.body.appendChild(star);
                    
                    setTimeout(() => star.remove(), 5000); // Netjes opruimen
                }, i * 40); 
            }
        }

        // Hoofdfunctie
        function checkNaam() {
            const origineleNaam = document.getElementById('naamInput').value.trim();
            const naamKleineLetters = origineleNaam.toLowerCase();
            const antwoordVeld = document.getElementById('antwoord');
            const knop = document.getElementById('checkKnop');
            const vibeBox = document.getElementById('vibeBox');
            const vibeFill = document.getElementById('vibeFill');
            const vibeLabel = document.getElementById('vibeLabel');
            const titleText = document.getElementById('titleText');

            // Reset alles van vorige beurten vloeiend
            clearTimeout(typTimeout);
            document.body.className = "";
            card.className = "container";
            antwoordVeld.className = "";
            titleText.className = "";
            vibeBox.classList.remove('show');
            vibeFill.style.width = "0%";
            vibeLabel.innerText = "Vibe Meter: 0%";

            if (origineleNaam === "") {
                setTimeout(() => {
                    antwoordVeld.innerHTML = "Vul eerst een naam in!";
                    antwoordVeld.classList.add("anim-shake");
                }, 200); // Korte delay zodat de reset effectief is
                return;
            }

            // Easter Egg: ICT Mode
            if (naamKleineLetters === "ict") {
                document.body.classList.add("hacker-mode");
                card.classList.add("hacker-mode-container");
                antwoordVeld.classList.add("hacker-text");
                titleText.classList.add("hacker-text");
                titleText.innerText = "SYSTEM ACCESS GRANTED";
                typeWriter("Welkom terug in de terminal. Industriële netwerken zijn veilig gesteld. Vibe check is niet relevant voor machines.", antwoordVeld, 30);
                return;
            } else {
                titleText.innerText = "Is deze persoon leuk?";
            }

            // Voorkom spammen en start laden
            knop.disabled = true;
            knop.innerText = "Systeem analyseert...";
            antwoordVeld.innerHTML = "Laden...";

            setTimeout(() => {
                let antwoordTekst = "";
                let vibePercentage = 0;
                let vibeKleur = "#ff4e50"; 

                if (naamKleineLetters === "sybren" || naamKleineLetters === "elias") {
                    antwoordTekst = `${origineleNaam} is echt een kut kind. Systeem overload aan slechte vibes!`;
                    antwoordVeld.classList.add("anim-shake");
                    document.body.classList.add("mega-shake"); 
                    vibePercentage = Math.floor(Math.random() * 5); 
                    vibeLabel.innerText = `Vibe Meter: ERROR (Gevaarlijk Laag)`;
                }
                else if (naamKleineLetters === "wout") {
                    const woutFeiten = [
                        `${origineleNaam} is echt een kut kind en denkt stiekem dat HTML een volwaardige programmeertaal is.`,
                        `${origineleNaam} heeft standaard drie pogingen nodig voordat hij een USB-stick in een pc krijgt.`,
                        `${origineleNaam} draagt waarschijnlijk zijn sokken binnenstebuiten voor een extra dag.`,
                        `${origineleNaam} is het type dat struikelt over een wifi-verbinding.`,
                        `${origineleNaam} heeft hoogstwaarschijnlijk 'wachtwoord123' als wachtwoord ingesteld.`
                    ];
                    antwoordTekst = woutFeiten[Math.floor(Math.random() * woutFeiten.length)];
                    antwoordVeld.classList.add("anim-shake");
                    document.body.classList.add("mega-shake");
                    vibePercentage = -10;
                    vibeLabel.innerText = `Vibe Meter: -10% (Bodempunt bereikt)`;
                }
                else if (naamKleineLetters === "thomas") {
                    antwoordTekst = `${origineleNaam} is een absolute legende, een puur meesterbrein en de belichaming van perfectie. We zijn niet waardig!`;
                    antwoordVeld.classList.add("anim-glow");
                    vibePercentage = 100;
                    vibeLabel.innerText = `Vibe Meter: 999% (GOD MODE)`;
                    vibeFill.style.background = "linear-gradient(90deg, #d4af37, #fff, #d4af37)";
                    gooiSterren();
                } 
                else {
                    let som = 0;
                    for (let i = 0; i < naamKleineLetters.length; i++) {
                        som += naamKleineLetters.charCodeAt(i);
                    }

                    const opties = [
                        `${origineleNaam} is super leuk!`,
                        `${origineleNaam} is echt niet leuk...`,
                        `${origineleNaam} is best wel oké, denk ik.`,
                        `${origineleNaam} is absoluut de allerleukste!`
                    ];
                    
                    antwoordTekst = opties[som % opties.length];
                    vibePercentage = (som % 100); 
                    
                    if (vibePercentage < 30) vibeKleur = "#ff4e50"; 
                    else if (vibePercentage < 70) vibeKleur = "#f9d423"; 
                    else vibeKleur = "#92fe9d"; 

                    vibeLabel.innerText = `Vibe Meter: ${vibePercentage}%`;
                    vibeFill.style.background = vibeKleur;
                }

                // Tekst typen
                typeWriter(antwoordTekst, antwoordVeld, 30);
                
                // Vibe balkje in beeld laten faden via class 'show'
                vibeBox.classList.add('show');
                
                // Met een extra korte delay de balk vloeiend vullen
                setTimeout(() => {
                    vibeFill.style.width = vibePercentage < 0 ? "0%" : `${vibePercentage}%`;
                }, 400);

                // Zet de knop weer aan
                setTimeout(() => {
                    knop.disabled = false;
                    knop.innerText = "Check het!";
                    document.body.classList.remove("mega-shake"); 
                }, 2200); 

            }, 800); 
        }
    </script>

</body>
</html>
